name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ruff
      - name: Ruff check
        run: ruff check app.py forwarder.py

  syntax:
    name: Syntax & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify imports
        run: python -c "import app; print('app.py OK')" && python -c "import forwarder; print('forwarder.py OK')"

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t telegram-forwarder:test .
      - name: Verify image runs
        run: docker run --rm telegram-forwarder:test python -c "import app, forwarder; print('All imports OK')"